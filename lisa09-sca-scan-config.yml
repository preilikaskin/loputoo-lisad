# SCA (Software Composition Analysis) Scan Configuration
# OWASP Juice Shop v19.1.1 — thesis research
# Tool: OWASP Dependency-Check 12.2.0
#
# -------------------------------------------------------------
# OWASP Dependency-Check
# -------------------------------------------------------------
# Run command:
#   dependency-check \
#     --project "juice-shop" \
#     --scan /path/to/juice-shop \
#     --format JSON --format HTML \
#     --out sca/reports/ \
#     --nvdApiKey <NVD_API_KEY>
#

scan:
  tools:
    - name: OWASP Dependency-Check
      version: "12.2.0"
      type: standalone
      description: >
        Scans package.json / node_modules for known CVEs
        using the NVD database.

  target:
    application: OWASP Juice Shop
    version: v19.1.1
    stack: "TypeScript / JavaScript (Node.js / Express)"
    manifests:
      - package.json
      - package-lock.json

  exclusions: []
    # No exclusions — DC scans the full project directory

  output:
    - tool: dependency-check
      format: json
      file: sca/reports/dependency-check-report.json
    - tool: dependency-check
      format: html
      file: sca/reports/dependency-check-report.html
